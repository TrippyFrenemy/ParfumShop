{% extends "admin/base.html" %}

{% block title %}Налаштування{% endblock %}
{% block page_title %}Налаштування{% endblock %}

{% block content %}
<div class="max-w-3xl">
    <form method="POST" action="/admin/settings">
        <!-- General settings -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-5 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Загальнi налаштування
            </h2>

            <div class="space-y-5">
                <!-- Shop name -->
                <div>
                    <label for="shop_name" class="block text-sm font-medium text-gray-700 mb-1.5">Назва магазину</label>
                    <input type="text" id="shop_name" name="shop_name"
                           value="{{ settings.shop_name if settings is defined and settings and settings.shop_name else 'ParfumShop' }}"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"
                           placeholder="ParfumShop">
                </div>

                <!-- Min order amount -->
                <div>
                    <label for="min_order_amount" class="block text-sm font-medium text-gray-700 mb-1.5">Мiнiмальна сума замовлення (грн)</label>
                    <input type="number" id="min_order_amount" name="min_order_amount" step="0.01" min="0"
                           value="{{ settings.min_order_amount if settings is defined and settings and settings.min_order_amount else 0 }}"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"
                           placeholder="0">
                </div>
            </div>
        </div>

        <!-- Contact info -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-5 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
                Контактна iнформацiя
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <!-- Phone -->
                <div>
                    <label for="shop_phone" class="block text-sm font-medium text-gray-700 mb-1.5">Телефон</label>
                    <input type="text" id="shop_phone" name="shop_phone"
                           value="{{ settings.shop_phone if settings is defined and settings and settings.shop_phone else '' }}"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"
                           placeholder="+380 XX XXX XX XX">
                </div>

                <!-- Email -->
                <div>
                    <label for="shop_email" class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <input type="email" id="shop_email" name="shop_email"
                           value="{{ settings.shop_email if settings is defined and settings and settings.shop_email else '' }}"
                           class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition"
                           placeholder="info@parfumshop.ua">
                </div>
            </div>
        </div>

        <!-- Texts -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 mb-6">
            <h2 class="text-lg font-semibold text-gray-900 mb-5 flex items-center gap-2">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Текстовi блоки
            </h2>

            <div class="space-y-5">
                <!-- Payment info -->
                <div>
                    <label for="payment_info_text" class="block text-sm font-medium text-gray-700 mb-1.5">Iнформацiя про оплату</label>
                    <textarea id="payment_info_text" name="payment_info_text" rows="4"
                              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition resize-y"
                              placeholder="Реквiзити для оплати, умови оплати...">{{ settings.payment_info_text if settings is defined and settings and settings.payment_info_text else '' }}</textarea>
                </div>

                <!-- Contacts text -->
                <div>
                    <label for="contacts_text" class="block text-sm font-medium text-gray-700 mb-1.5">Текст на сторiнцi контактiв</label>
                    <textarea id="contacts_text" name="contacts_text" rows="4"
                              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition resize-y"
                              placeholder="Контактна iнформацiя, графiк роботи...">{{ settings.contacts_text if settings is defined and settings and settings.contacts_text else '' }}</textarea>
                </div>

                <!-- About text -->
                <div>
                    <label for="about_text" class="block text-sm font-medium text-gray-700 mb-1.5">Про магазин</label>
                    <textarea id="about_text" name="about_text" rows="5"
                              class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-brand-400 focus:ring-2 focus:ring-brand-100 transition resize-y"
                              placeholder="Опис магазину...">{{ settings.about_text if settings is defined and settings and settings.about_text else '' }}</textarea>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="flex items-center gap-3">
            <button type="submit" class="px-6 py-2.5 bg-brand-600 text-white text-sm font-medium rounded-lg hover:bg-brand-700 transition shadow-sm inline-flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                Зберегти налаштування
            </button>
        </div>
    </form>
</div>
{% endblock %}
