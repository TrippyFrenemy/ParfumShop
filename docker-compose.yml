version: "3.10"

services:
  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
      # - "127.0.0.1:6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["./config/entrypoint.sh"]
    volumes:
      - .:/fastapi_app
      - ./tmp:/fastapi_app/tmp
    ports:
      - "8000:8000"
      # - "127.0.0.1:8000:8000"
    env_file:
      - .env_docker
    depends_on:
      - redis

  db:
    image: postgres:17
    env_file:
      - .env_docker
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    ports:
      - "5432:5432"
      # - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
